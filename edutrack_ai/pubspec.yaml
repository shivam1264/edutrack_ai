name: edutrack_ai
description: EduTrack AI - AI-Powered Parent-Student Monitoring App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  firebase_core: ^3.10.0
  firebase_auth: ^5.4.0
  cloud_firestore: ^5.6.0
  firebase_messaging: ^15.2.0
  cloud_functions: ^5.1.0

  # State Management
  provider: ^6.1.2

  # Charts
  fl_chart: ^0.68.0

  # HTTP  
  http: ^1.2.0
  http_parser: ^4.0.2     # for Cloudinary multipart uploads
  mime: ^1.0.5             # detect file MIME type for Cloudinary
  dio: ^5.4.3

  # UI / UX
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  flutter_animate: ^4.5.0
  animations: ^2.0.11
  badges: ^3.1.2
  flutter_markdown: ^0.7.2
  excel: ^4.0.5
  csv: ^6.0.0
  onesignal_flutter: ^5.2.0

  # Date / Time
  table_calendar: ^3.1.2

  # File Handling
  file_picker: ^8.1.4
  image_picker: ^1.1.2
  open_file: ^3.3.2
  url_launcher: ^6.3.1
  syncfusion_flutter_pdfviewer: ^33.2.4
  webview_flutter: ^4.4.2
  speech_to_text: ^7.3.0
  flutter_tts: ^3.8.5
  path_provider: ^2.1.2

  # Local Storage
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^10.0.0

  # Note: flutter_local_notifications removed — not supported on Chrome/web
  # FCM push notifications still work via firebase_messaging

  # Charts / Progress
  percent_indicator: ^4.2.3
  permission_handler: ^11.3.1

  # Other utilities
  uuid: ^4.4.2
  equatable: ^2.0.5
  connectivity_plus: ^6.1.1
  timeago: ^3.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

dependency_overrides:
  sqflite: 2.3.3+1
  sqflite_common: 2.5.4
  js: ^0.7.1
  # Pin path_provider_android to pre-jni version (2.3.x uses jni which requires broken NDK 28)
  path_provider_android: 2.2.12

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
